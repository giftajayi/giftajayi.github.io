<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Ajayi | Data Analyst Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="sidebar">
        <h2>Gift Ajayi</h2>
        <ul>
            <li><a href="#about"><i class="fas fa-user"></i> About Me</a></li>
            <li><a href="#projects"><i class="fas fa-chart-line"></i> Projects</a></li>
            <li><a href="#contact"><i class="fas fa-envelope"></i> Contact</a></li>
        </ul>
    </div>
    
    <div class="main-content">
        <section id="about">
            <h2>About Me</h2>
            <p>I am a passionate data analyst with expertise in Power BI, SQL, and Python.</p>
        </section>
        
        <section id="projects">
            <h2>Projects</h2>
            <div class="slideshow-container">
                <div class="slide fade">
                    <img src="images/weather_dashboard.png" alt="Canada Weather Dashboard">
                    <div class="caption">Canada Weather Dashboard</div>
                </div>
                <div class="slide fade">
                    <img src="images/vancouver_crime.png" alt="Vancouver Crime Dashboard">
                    <div class="caption">Vancouver Crime Analysis</div>
                </div>
                <div class="slide fade">
                    <img src="images/sales_dashboard.png" alt="Sales Report Dashboard">
                    <div class="caption">Sales Report Dashboard</div>
                </div>
            </div>
        </section>
        
        <section id="contact">
            <h2>Contact Me</h2>
            <p>Email: your-email@example.com</p>
        </section>
    </div>
    
    <script>
        let slideIndex = 0;
        function showSlides() {
            let slides = document.querySelectorAll(".slide");
            slides.forEach(slide => slide.style.display = "none");
            slideIndex++;
            if (slideIndex > slides.length) {slideIndex = 1}
            slides[slideIndex - 1].style.display = "block";
            setTimeout(showSlides, 3000);
        }
        showSlides();
    </script>
</body>
</html>
